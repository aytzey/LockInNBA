name: Deploy Elastic Beanstalk

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      EB_APPLICATION_NAME: ${{ vars.EB_APPLICATION_NAME }}
      EB_ENVIRONMENT_MAIN: ${{ vars.EB_ENVIRONMENT_MAIN }}
      EB_S3_BUCKET: ${{ vars.EB_S3_BUCKET }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve branch target
        id: target
        run: |
          case "${GITHUB_REF_NAME}" in
            main)
              ENVIRONMENT_NAME="${EB_ENVIRONMENT_MAIN}"
              echo "image_tag=main" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported branch: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

          echo "environment_name=${ENVIRONMENT_NAME}" >> "$GITHUB_OUTPUT"

          if [ -z "${AWS_REGION}" ] || [ -z "${ECR_REPOSITORY}" ] || [ -z "${EB_APPLICATION_NAME}" ] || [ -z "${EB_S3_BUCKET}" ] || [ -z "${ENVIRONMENT_NAME}" ]; then
            echo "Missing Elastic Beanstalk deployment variables." >&2
            exit 1
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.target.outputs.image_tag }}
        run: |
          IMAGE_URI="${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build --pull -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
        id: image

      - name: Create Dockerrun bundle
        env:
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
        run: |
          mkdir -p bundle
          cat > bundle/Dockerrun.aws.json <<EOF
          {
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "${IMAGE_URI}",
              "Update": "true"
            },
            "Ports": [
              {
                "ContainerPort": "3000"
              }
            ]
          }
          EOF
          cd bundle
          zip -r ../dockerrun.zip Dockerrun.aws.json

      - name: Upload application bundle
        id: bundle
        run: |
          VERSION_LABEL="${GITHUB_REF_NAME}-${GITHUB_SHA::7}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          S3_KEY="deployments/${GITHUB_REF_NAME}/${VERSION_LABEL}.zip"
          aws s3 cp dockerrun.zip "s3://${EB_S3_BUCKET}/${S3_KEY}"
          echo "version_label=${VERSION_LABEL}" >> "$GITHUB_OUTPUT"
          echo "s3_key=${S3_KEY}" >> "$GITHUB_OUTPUT"

      - name: Create application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${EB_APPLICATION_NAME}" \
            --version-label "${{ steps.bundle.outputs.version_label }}" \
            --source-bundle S3Bucket="${EB_S3_BUCKET}",S3Key="${{ steps.bundle.outputs.s3_key }}"

      - name: Update environment
        run: |
          aws elasticbeanstalk update-environment \
            --application-name "${EB_APPLICATION_NAME}" \
            --environment-name "${{ steps.target.outputs.environment_name }}" \
            --version-label "${{ steps.bundle.outputs.version_label }}"
          aws elasticbeanstalk wait environment-updated \
            --application-name "${EB_APPLICATION_NAME}" \
            --environment-names "${{ steps.target.outputs.environment_name }}"
          ACTIVE_VERSION="$(aws elasticbeanstalk describe-environments \
            --application-name "${EB_APPLICATION_NAME}" \
            --environment-names "${{ steps.target.outputs.environment_name }}" \
            --query 'Environments[0].VersionLabel' \
            --output text)"
          if [ "${ACTIVE_VERSION}" != "${{ steps.bundle.outputs.version_label }}" ]; then
            echo "Elastic Beanstalk did not activate the expected version." >&2
            echo "Expected: ${{ steps.bundle.outputs.version_label }}" >&2
            echo "Actual: ${ACTIVE_VERSION}" >&2
            aws elasticbeanstalk describe-events \
              --environment-name "${{ steps.target.outputs.environment_name }}" \
              --max-records 10 \
              --query 'Events[].{Date:EventDate,Severity:Severity,Message:Message}' \
              --output table
            exit 1
          fi

      - name: Prune old application versions
        if: github.ref_name == 'main'
        env:
          KEEP_COUNT: "2"
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess

          app = os.environ["EB_APPLICATION_NAME"]
          region = os.environ["AWS_REGION"]
          keep_count = int(os.environ["KEEP_COUNT"])
          prefix = "main-"

          raw = subprocess.check_output(
              [
                  "aws",
                  "elasticbeanstalk",
                  "describe-application-versions",
                  "--application-name",
                  app,
                  "--region",
                  region,
                  "--output",
                  "json",
              ],
              text=True,
          )
          versions = json.loads(raw)["ApplicationVersions"]
          versions = [v for v in versions if v["VersionLabel"].startswith(prefix)]
          versions.sort(key=lambda v: v["DateCreated"], reverse=True)

          for version in versions[keep_count:]:
              label = version["VersionLabel"]
              bundle = version.get("SourceBundle") or {}
              subprocess.run(
                  [
                      "aws",
                      "elasticbeanstalk",
                      "delete-application-version",
                      "--application-name",
                      app,
                      "--region",
                      region,
                      "--version-label",
                      label,
                  ],
                  check=True,
              )
              if bundle.get("S3Bucket") and bundle.get("S3Key"):
                  subprocess.run(
                      [
                          "aws",
                          "s3",
                          "rm",
                          f"s3://{bundle['S3Bucket']}/{bundle['S3Key']}",
                      ],
                      check=False,
                  )
              print(f"deleted {label}")
          PY
