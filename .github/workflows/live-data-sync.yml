name: Live Data Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      LOCKIN_BASE_URL: ${{ vars.LOCKIN_BASE_URL }}
      LOCKIN_SYNC_SECRET: ${{ secrets.LOCKIN_SYNC_SECRET }}
    steps:
      - name: Trigger protected sync endpoint
        run: |
          if [ -z "$LOCKIN_BASE_URL" ] || [ -z "$LOCKIN_SYNC_SECRET" ]; then
            echo "Skipping live sync: LOCKIN_BASE_URL or LOCKIN_SYNC_SECRET is missing."
            exit 0
          fi

          BASE_URL="${LOCKIN_BASE_URL%/}"

          curl --fail --show-error --silent \
            -H "Authorization: Bearer $LOCKIN_SYNC_SECRET" \
            "$BASE_URL/api/internal/live-sync?includeTomorrow=true"
