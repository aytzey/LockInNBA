name: Deploy App Runner

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      APP_RUNNER_SERVICE_ARN_MAIN: ${{ vars.APP_RUNNER_SERVICE_ARN_MAIN }}
      APP_RUNNER_SERVICE_ARN_DEV: ${{ vars.APP_RUNNER_SERVICE_ARN_DEV }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve branch target
        id: target
        run: |
          case "${GITHUB_REF_NAME}" in
            main)
              SERVICE_ARN="${APP_RUNNER_SERVICE_ARN_MAIN}"
              echo "image_tag=main" >> "$GITHUB_OUTPUT"
              ;;
            dev)
              SERVICE_ARN="${APP_RUNNER_SERVICE_ARN_DEV}"
              echo "image_tag=dev" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported branch: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

          echo "service_arn=${SERVICE_ARN}" >> "$GITHUB_OUTPUT"

          if [ -z "${AWS_REGION}" ] || [ -z "${ECR_REPOSITORY}" ] || [ -z "${SERVICE_ARN}" ]; then
            echo "Missing AWS/App Runner configuration variables." >&2
            exit 1
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.target.outputs.image_tag }}
        run: |
          IMAGE_URI="${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build --pull -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

      - name: Start App Runner deployment
        run: |
          aws apprunner start-deployment \
            --service-arn "${{ steps.target.outputs.service_arn }}"
